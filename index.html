<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cocillos Kleiderbestellung 2027</title>
<style>
:root{
  --bg:#0b0b0d;--panel:#17171b;--panel2:#202027;--text:#f6f6f6;--muted:#aaa;--red:#d71920;--red2:#ff3b45;--line:#33333b;--green:#46d27c;
}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#24242c 0,#0b0b0d 42%);color:var(--text)}
header{padding:34px 18px 18px;text-align:center;background:linear-gradient(180deg,#050505,#111116);border-bottom:1px solid var(--line)}
.logo{font-size:42px;font-weight:900;letter-spacing:3px}.subtitle{color:var(--muted);margin-top:8px}.wrap{max-width:1180px;margin:0 auto;padding:22px 16px 90px}
.deadline{margin:18px auto 22px;max-width:720px;background:linear-gradient(135deg,#18181e,#101014);border:1px solid #363640;border-radius:20px;padding:20px;text-align:center;box-shadow:0 18px 45px rgba(0,0,0,.28)}
.deadline small{color:var(--muted);letter-spacing:2px;font-weight:bold}.timer{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:16px 0}.timebox{background:#070708;border:1px solid #303038;border-radius:14px;padding:14px}.timebox b{font-size:24px}.timebox span{display:block;color:var(--muted);font-size:12px;margin-top:4px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:24px 0}.topbar h2{margin:0}.cartBtn{background:var(--red);color:white;border:0;border-radius:999px;padding:13px 18px;font-weight:bold;cursor:pointer;box-shadow:0 10px 25px rgba(215,25,32,.25)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:18px}.card{background:rgba(23,23,27,.95);border:1px solid #303039;border-radius:20px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.25)}
.pic{height:185px;background:linear-gradient(135deg,#303039,#111);display:flex;align-items:center;justify-content:center;color:#bbb;font-weight:bold}.content{padding:16px}.content h3{margin:0 0 6px;font-size:20px}.art{color:var(--muted);font-size:12px;margin-bottom:10px}.desc{color:var(--muted);font-size:14px;line-height:1.4;min-height:38px}.config{margin-top:14px;border:1px solid #3a3a44;border-radius:16px;background:#101014;overflow:hidden}.config summary{list-style:none;cursor:pointer;padding:14px 15px;font-weight:900;display:flex;justify-content:space-between;align-items:center}.config summary::-webkit-details-marker{display:none}.config summary:after{content:'▾';color:var(--red2);font-size:18px}.config[open] summary:after{content:'▴'}.configInner{padding:0 14px 14px;border-top:1px solid #2c2c35}.priceTag{font-size:24px;font-weight:900;color:white;margin:12px 0}.priceTag small{font-size:12px;color:var(--muted);font-weight:400}
label{display:block;color:#ddd;font-size:13px;margin-top:10px;margin-bottom:5px} select,input{width:100%;padding:11px;border-radius:10px;border:1px solid #383842;background:#0d0d10;color:white} input[type=number]{appearance:textfield}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.details{margin-top:12px;border:1px solid #363640;border-radius:14px;background:#111116;overflow:hidden}.details summary{cursor:pointer;padding:12px;font-weight:bold;color:#fff}.details .inner{padding:0 12px 12px;color:var(--muted);font-size:13px}.add{margin-top:14px;width:100%;border:0;border-radius:12px;background:linear-gradient(135deg,var(--red),#8f0f14);color:white;padding:13px;font-weight:900;cursor:pointer}.add:disabled{opacity:.45;cursor:not-allowed}.hint{color:var(--muted);font-size:12px;margin-top:8px;line-height:1.35}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}.modal.open{display:flex}.cart{width:min(760px,100%);max-height:90vh;overflow:auto;background:#15151a;border:1px solid #3a3a44;border-radius:22px;box-shadow:0 25px 80px rgba(0,0,0,.55)}.cartHead{display:flex;justify-content:space-between;align-items:center;padding:18px;border-bottom:1px solid var(--line)}.cartHead h2{margin:0}.close{background:#282832;color:white;border:0;border-radius:10px;padding:10px 12px;cursor:pointer}.cartBody{padding:18px}.cartItem{display:grid;grid-template-columns:58px 1fr auto;gap:12px;align-items:center;border-bottom:1px solid #2d2d35;padding:12px 0}.thumb{width:58px;height:58px;border-radius:12px;background:linear-gradient(135deg,#333,#111);display:flex;align-items:center;justify-content:center;font-size:18px}.cartItem b{display:block}.cartItem small{color:var(--muted)}.remove{background:none;color:#ff7878;border:0;cursor:pointer}.checkout{margin-top:18px;background:#101014;border:1px solid #33333b;border-radius:16px;padding:16px}.checkout h3{margin:0 0 10px}.submit{width:100%;margin-top:14px;border:0;border-radius:12px;padding:14px;background:var(--green);color:#08110b;font-weight:900;cursor:pointer}.status{margin-top:10px;color:var(--muted);font-size:13px}.total{font-size:24px;font-weight:900;text-align:right;margin-top:14px}.expired{opacity:.45;filter:grayscale(1)}
@media(max-width:620px){.timer{grid-template-columns:repeat(2,1fr)}.topbar{position:sticky;top:0;background:#0b0b0dcc;backdrop-filter:blur(10px);padding:10px 0;z-index:5}.cartItem{grid-template-columns:48px 1fr}.cartItem .remove{grid-column:2;text-align:left}.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="logo">COCILLOS</div>
  <div class="subtitle">Guggenmusik · Kleiderbestellung 2027</div>
</header>
<div class="wrap">
  <section class="deadline" id="deadlineBox">
    <small>⏳ BESTELLSCHLUSS IN</small>
    <div class="timer">
      <div class="timebox"><b id="d">0</b><span>Tage</span></div>
      <div class="timebox"><b id="h">0</b><span>Stunden</span></div>
      <div class="timebox"><b id="m">0</b><span>Minuten</span></div>
      <div class="timebox"><b id="s">0</b><span>Sekunden</span></div>
    </div>
    <div>29. Januar 2027 · 23:59 Uhr</div>
  </section>
  <div class="topbar"><h2>Produkte</h2><button class="cartBtn" onclick="openCart()">🛒 Warenkorb ansehen (<span id="cartCount">0</span>)</button></div>
  <div class="grid" id="products"></div>
</div>

<div class="modal" id="cartModal">
  <div class="cart">
    <div class="cartHead"><h2>Warenkorb</h2><button class="close" onclick="closeCart()">Schliessen</button></div>
    <div class="cartBody">
      <div id="cartItems"></div>
      <div class="total">Total: CHF <span id="cartTotal">0.00</span></div>
      <div class="checkout">
        <h3>Bestellung abschliessen</h3>
        <label>Vorname</label><input id="firstName" placeholder="Vorname" />
        <label>Nachname</label><input id="lastName" placeholder="Nachname" />
        <button class="submit" onclick="submitOrder()">Bestellung absenden</button>
        <div class="status" id="status"></div>
      </div>
    </div>
  </div>
</div>
<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKLNJgzRF5c_ltZOToYydm_7EOs003J2OUywhaJVqoDiaZBHSLlPx2iu08FC3nEZsy/exec";
const FINISHING = "Stick Brust links";
const LOGO_PRICE = 9.90;
const NAME_PRICE = 8.00;
const deadline = new Date("2027-01-29T23:59:59+01:00");
let expired = false;
const products = [
 {id:'tshirt', title:'T-Shirt Classic', articleNumber:'029360-99', base:9.90, img:'👕', gender:true, sizes:['XS','S','M','L','XL','XXL','3XL','4XL'], name:true, desc:'Klassisches schwarzes T-Shirt mit Rundhalsausschnitt.'},
 {id:'ziphoodie', title:'Kapuzenjacke Basic', articleNumber:'021035-99', base:35.00, img:'🧥', gender:true, sizes:['XS','S','M','L','XL','XXL','3XL'], name:true, desc:'Schwarze Sweatjacke mit Kapuze und Kängurutasche.'},
 {id:'hoodie', title:'Hoody Classic', articleNumber:'021031-99', base:30.00, img:'🧥', gender:false, sizes:['XS','S','M','L','XL','XXL','3XL'], name:true, desc:'Schwarzer Kapuzensweater mit Kängurutasche.'},
 {id:'fleece', title:'Fleece Jacke Basic', articleNumber:'023914-99', base:35.00, img:'🧥', gender:true, sizes:['XS','S','M','L','XL','XXL','3XL','4XL'], name:true, desc:'Microfleece-Jacke mit Stehkragen und Reissverschlusstaschen.'},
 {id:'softshell', title:'Softshell Jacke Classic', articleNumber:'0200912-99', base:59.90, img:'🧥', gender:true, sizes:['XS','S','M','L','XL','XXL','3XL','4XL'], name:true, desc:'Schwarze Softshelljacke, wasserabweisend und atmungsaktiv.'},
 {id:'jn1138', title:'Daunenweste', articleNumber:'JN1138 black', base:75.00, img:'🦺', gender:true, sizes:['S','M','L','XL','XXL','3XL'], name:true, desc:'Leichte schwarze Weste, wind- und wasserabweisend.'},
 {id:'jn1139', title:'Daunenjacke', articleNumber:'JN1139 black', base:86.90, img:'🧥', gender:true, sizes:['S','M','L','XL','XXL','3XL'], name:true, desc:'Leichte schwarze Daunenjacke mit Seitentaschen.'},
 {id:'cap', title:'Flexfit Cap', articleNumber:'6277 blk/blk', base:23.90, img:'🧢', gender:false, sizes:['S/M','L/XL'], name:false, desc:'Schwarze Flexfit Cap mit gebogenem Schirm.'},
 {id:'beanie', title:'Clique Hubert w. Patch', articleNumber:'024129', base:14.90, img:'🎩', gender:false, sizes:['onesize'], name:false, desc:'Schwarze Mütze mit Patch, Einheitsgrösse.'},
 {id:'bag', title:'Bauchtasche BaseBag', articleNumber:'BG53', base:0, img:'🎒', gender:false, sizes:['onesize'], name:false, desc:'Schwarze Bauchtasche für Alltag und Fasnacht.'},
 {id:'glasses', title:'Sonnenbrille', articleNumber:'Werbeartikel schwarz', base:3.20, img:'🕶️', gender:false, sizes:['onesize'], name:false, desc:'Schwarze Sonnenbrille als Werbeartikel.'}
];
let cart=[];
function money(v){return Number(v||0).toFixed(2)}
function renderProducts(){
 const root=document.getElementById('products'); root.innerHTML='';
 products.forEach(p=>{
  root.insertAdjacentHTML('beforeend',`<div class="card" id="card-${p.id}">
    <div class="pic">${p.img}<br><span style="font-size:13px;margin-left:8px">Produktbild folgt</span></div>
    <div class="content"><h3>${p.title}</h3><div class="art">${p.articleNumber}</div><div class="desc">${p.desc || ''}</div>
    <div class="priceTag">ab CHF <span>${money(p.base + LOGO_PRICE)}</span> <small>/ Stück mit Logo</small></div>
    <details class="config"><summary>Produkt auswählen</summary><div class="configInner">
      <div class="row">${p.gender?`<div><label>Schnitt</label><select id="gender-${p.id}" onchange="updateCardPrice('${p.id}')"><option>Herren</option><option>Damen</option></select></div>`:`<div><label>Schnitt</label><select id="gender-${p.id}" disabled><option>Unisex</option></select></div>`}
      <div><label>Grösse</label><select id="size-${p.id}" onchange="updateCardPrice('${p.id}')">${p.sizes.map(s=>`<option>${s}</option>`).join('')}</select></div></div>
      <label>Menge</label><input id="qty-${p.id}" type="number" min="0" value="0" oninput="updateCardPrice('${p.id}')" />
      ${p.name?`<label>Name auf Brust rechts</label><input id="name-${p.id}" placeholder="leer lassen = kein Name" oninput="updateCardPrice('${p.id}')"/><div class="hint">Name optional: + CHF ${money(NAME_PRICE)} pro Stück.</div>`:''}
      <div class="priceTag">CHF <span id="price-${p.id}">${money(0)}</span> <small>aktuell</small></div>
      <div class="hint">Grundpreis + ${FINISHING} CHF ${money(LOGO_PRICE)}${p.name?' + optional Name CHF '+money(NAME_PRICE):''}</div>
      <button class="add" onclick="addToCart('${p.id}')">In den Warenkorb</button>
    </div></details></div></div>`);
 });
}
function calcItem(p){
 const qty=Math.max(0, Number(document.getElementById('qty-'+p.id).value||0));
 const nameEl=document.getElementById('name-'+p.id); const personalization=nameEl?nameEl.value.trim():'';
 const unit=p.base + LOGO_PRICE + (personalization?NAME_PRICE:0);
 return {qty, unit, total:unit*qty, personalization};
}
function updateCardPrice(id){const p=products.find(x=>x.id===id); const c=calcItem(p); document.getElementById('price-'+id).textContent=money(c.total)}
function addToCart(id){
 if(expired) return; const p=products.find(x=>x.id===id); const c=calcItem(p); if(c.qty<1){alert('Bitte Menge wählen.');return;}
 cart.push({product:p.title, articleNumber:p.articleNumber, image:p.img, gender:document.getElementById('gender-'+id).value, size:document.getElementById('size-'+id).value, quantity:c.qty, finishing:FINISHING, personalization:c.personalization, unitPrice:c.unit, totalPrice:c.total});
 updateCart(); openCart();
}
function updateCart(){document.getElementById('cartCount').textContent=cart.length; const root=document.getElementById('cartItems'); root.innerHTML=cart.length?'':'<p style="color:#aaa">Der Warenkorb ist leer.</p>'; let total=0; cart.forEach((it,i)=>{total+=it.totalPrice; root.insertAdjacentHTML('beforeend',`<div class="cartItem"><div class="thumb">${it.image}</div><div><b>${it.product}</b><small>${it.gender} · ${it.size} · Menge ${it.quantity}${it.personalization?' · Name: '+it.personalization:''}</small><br><small>CHF ${money(it.unitPrice)} / Stück</small></div><button class="remove" onclick="cart.splice(${i},1);updateCart()">Entfernen</button></div>`)}); document.getElementById('cartTotal').textContent=money(total)}
function openCart(){updateCart();document.getElementById('cartModal').classList.add('open')} function closeCart(){document.getElementById('cartModal').classList.remove('open')}
async function submitOrder(){
 const first=document.getElementById('firstName').value.trim(); const last=document.getElementById('lastName').value.trim(); const status=document.getElementById('status');
 if(!first||!last){status.textContent='Bitte Vorname und Nachname eintragen.';return} if(cart.length===0){status.textContent='Der Warenkorb ist leer.';return}
 status.textContent='Bestellung wird gesendet...';
 try{ const res=await fetch(GOOGLE_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({firstName:first,lastName:last,name:first+' '+last,items:cart})});
  status.textContent='Bestellung gesendet. Danke!'; cart=[]; updateCart();
 }catch(e){status.textContent='Fehler beim Senden. Bitte später nochmals versuchen.';}
}
function tick(){const now=new Date(); let diff=deadline-now; if(diff<=0){expired=true;diff=0;document.body.classList.add('expired');document.querySelectorAll('.add').forEach(b=>b.disabled=true)} ['d','h','m','s'].forEach(()=>{}); document.getElementById('d').textContent=Math.floor(diff/86400000); document.getElementById('h').textContent=Math.floor(diff/3600000)%24; document.getElementById('m').textContent=Math.floor(diff/60000)%60; document.getElementById('s').textContent=Math.floor(diff/1000)%60}
renderProducts(); updateCart(); tick(); setInterval(tick,1000);
</script>
</body>
</html>
